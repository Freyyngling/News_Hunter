<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0c12">
  <title>Frey's News Hunter</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

<div id="bg-layer"></div>
<video id="bg-video" autoplay loop muted playsinline></video>
<div id="bg-video-overlay"></div>

<div id="app">

  <header id="header">
    <div class="header-top">
      <h1 id="site-title">Frey's News Hunter</h1>
      <div class="header-controls">
        <div class="fetch-count-wrap">
          <label for="fetch-count">件数</label>
          <input type="number" id="fetch-count" value="20" min="1" max="200">
        </div>
        <button class="btn-icon" id="btn-view">☰ リスト</button>
        <button class="btn-icon" id="btn-bg">🖼️ 背景</button>
        <button class="btn-icon" id="btn-settings">⚙️ 設定</button>
        <button id="btn-fetch">🔄 今すぐ取得</button>
      </div>
    </div>
    <div id="status-bar">タブを選んで取得ボタンを押してください</div>
  </header>

  <div id="tab-bar-wrap">
    <div id="tab-bar"></div>
  </div>

  <main id="main-content">
    <div id="articles-container">
      <div class="no-articles">タブを選択して「今すぐ取得」を押すと記事が表示されます。</div>
    </div>
  </main>

</div>

<!-- ===== タブ追加モーダル ===== -->
<div class="modal-overlay" id="modal-add-tab">
  <div class="modal-box">
    <h2>📌 カスタムタブを追加</h2>
    <div class="modal-field">
      <label>タブ名</label>
      <input type="text" id="new-tab-name" placeholder="例：AI・人工知能">
    </div>
    <div class="modal-field">
      <label>RSS URL（1行1つ、複数入力可）</label>
      <textarea id="new-tab-rssurls" rows="4" placeholder="https://gigazine.net/news/rss_2.0/&#10;https://feeds.bbci.co.uk/news/technology/rss.xml" style="width:100%;padding:9px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);border-radius:8px;color:#e8eaf0;font-size:0.85rem;resize:vertical;font-family:inherit;"></textarea>
    </div>
    <div class="modal-field">
      <label>登録済みRSSソースから選んで追加</label>
      <div id="source-picker" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;"></div>
    </div>
    <div class="modal-field">
      <label>キーワードフィルタ（任意）　スペース区切りOR検索</label>
      <input type="text" id="new-tab-keyword" placeholder="例：AI 人工知能 機械学習">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="btn-cancel-tab">キャンセル</button>
      <button class="btn-primary" id="btn-save-tab">追加する</button>
    </div>
  </div>
</div>

<!-- ===== 設定モーダル ===== -->
<div class="modal-overlay" id="modal-settings">
  <div class="modal-box wide">
    <h2>⚙️ 設定</h2>

    <!-- タブごとのRSS URL編集 -->
    <div class="settings-section">
      <h3>タブのRSS URL編集</h3>
      <p class="settings-desc">各タブで使うRSSのURLを直接編集できます。1行1URLで入力し「💾 保存」を押すと即座に反映されます。</p>
      <div id="tab-edit-list"></div>
    </div>

    <!-- RSSソース候補 -->
    <div class="settings-section">
      <h3>RSSソース候補一覧</h3>
      <p class="settings-desc">カスタムタブ追加時にURLをすぐ選べるようにする候補リストです。📋でURLをコピーできます。</p>
      <div id="rss-sources-list"></div>
      <div class="add-source-row">
        <input type="text" id="new-rss-name" placeholder="ソース名（例：GIGAZINE）">
        <input type="url" id="new-rss-url" placeholder="RSSのURL">
        <button class="btn-primary" id="btn-add-rss">追加</button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-secondary" id="btn-reset-defaults" style="color:#ef4444;border-color:#ef4444;">⚠️ 全設定を初期化</button>
      <button class="btn-primary" id="btn-close-settings">閉じる</button>
    </div>
  </div>
</div>

<!-- ===== 背景設定モーダル ===== -->
<div class="modal-overlay" id="modal-bg">
  <div class="modal-box">
    <h2>🖼️ 背景設定</h2>
    <div id="bg-thumbs"></div>
    <div class="bg-upload-area">
      <label>自分の画像をアップロード（JPEG・PNG）</label>
      <input type="file" id="bg-upload-input" accept=".jpg,.jpeg,.png">
    </div>
    <div class="zoom-row">
      <label>表示サイズ</label>
      <input type="range" id="bg-zoom-slider" min="50" max="200" value="100" step="5">
      <span id="bg-zoom-value">100%</span>
    </div>
    <div class="modal-actions">
      <button class="btn-primary" id="btn-close-bg">閉じる</button>
    </div>
  </div>
</div>

<script src="storage.js"></script>
<script src="sources.js"></script>
<script src="app.js"></script>
</body>
</html>

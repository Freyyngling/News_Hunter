<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0c12">
  <title>Frey's News Hunter</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

<div id="bg-layer"></div>
<video id="bg-video" autoplay loop muted playsinline></video>
<div id="bg-video-overlay"></div>

<div id="app">

  <header id="header">
    <div class="header-top">
      <h1 id="site-title">Frey's News Hunter</h1>
      <div class="header-controls">
        <div class="fetch-count-wrap">
          <label for="fetch-count">件数</label>
          <input type="number" id="fetch-count" value="20" min="1" max="200">
        </div>
        <button class="btn-icon" id="btn-view">☰ リスト</button>
        <button class="btn-icon" id="btn-bg">🖼️ 背景</button>
        <button class="btn-icon" id="btn-settings">⚙️ 設定</button>
        <button id="btn-fetch">🔄 今すぐ取得</button>
      </div>
    </div>
    <div id="status-bar">ソースを選んでカテゴリを選択してください</div>
  </header>

  <!-- グループタブ（上段） -->
  <div id="group-tab-bar-wrap">
    <div id="group-tab-bar"></div>
  </div>

  <!-- カテゴリサブタブ（下段） -->
  <div id="cat-tab-bar-wrap" style="display:none;">
    <div id="cat-tab-bar"></div>
  </div>

  <main id="main-content">
    <div id="articles-container">
      <div class="no-articles">上のタブでソースとカテゴリを選び「今すぐ取得」を押してください</div>
    </div>
  </main>

</div>

<!-- カテゴリ追加モーダル -->
<div class="modal-overlay" id="modal-add-cat">
  <div class="modal-box">
    <h2>➕ カテゴリを追加</h2>
    <p style="font-size:.78rem;color:#8892a4;margin-bottom:14px;">ソース: <strong id="add-cat-group-name"></strong></p>
    <input type="hidden" id="add-cat-group-id">
    <div class="modal-field">
      <label>カテゴリ名（例：AI・テクノロジー）</label>
      <input type="text" id="add-cat-name" placeholder="カテゴリ名">
    </div>
    <div class="modal-field">
      <label>RSS URL</label>
      <input type="url" id="add-cat-url" placeholder="https://...">
    </div>
    <div class="modal-field">
      <label>キーワードフィルタ（任意）　スペース区切りOR検索</label>
      <input type="text" id="add-cat-kw" placeholder="例：AI 人工知能 ChatGPT">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="btn-cancel-cat">キャンセル</button>
      <button class="btn-primary" id="btn-save-cat">追加する</button>
    </div>
  </div>
</div>

<!-- ソースグループ追加モーダル -->
<div class="modal-overlay" id="modal-add-group">
  <div class="modal-box">
    <h2>➕ ソースを追加</h2>
    <div class="modal-field">
      <label>ソース名（例：📰 Yahoo!ニュース）</label>
      <input type="text" id="new-group-name" placeholder="ソース名">
    </div>
    <p style="font-size:.76rem;color:#8892a4;margin-top:8px;">追加後、設定（⚙️）からカテゴリとRSS URLを登録してください。</p>
    <div class="modal-actions">
      <button class="btn-secondary" id="btn-cancel-group">キャンセル</button>
      <button class="btn-primary" id="btn-save-group">追加</button>
    </div>
  </div>
</div>

<!-- 設定モーダル -->
<div class="modal-overlay" id="modal-settings">
  <div class="modal-box wide">
    <h2>⚙️ 設定 — ソース・カテゴリ管理</h2>
    <p class="settings-desc">各カテゴリのRSS URLを直接編集して「💾」で保存。変更は即座に反映されます。キーワードを設定するとそのカテゴリ内でさらに絞り込めます。</p>
    <div id="settings-group-list"></div>
    <div class="modal-actions">
      <button class="btn-secondary" id="btn-reset-defaults" style="color:#ef4444;border-color:#ef4444;">⚠️ 全設定を初期化</button>
      <button class="btn-primary" id="btn-close-settings">閉じる</button>
    </div>
  </div>
</div>

<!-- 背景設定モーダル -->
<div class="modal-overlay" id="modal-bg">
  <div class="modal-box">
    <h2>🖼️ 背景設定</h2>
    <div id="bg-thumbs"></div>
    <div class="bg-upload-area">
      <label>画像アップロード（JPEG・PNG）</label>
      <input type="file" id="bg-upload-input" accept=".jpg,.jpeg,.png">
    </div>
    <div class="zoom-row">
      <label>表示サイズ</label>
      <input type="range" id="bg-zoom-slider" min="50" max="200" value="100" step="5">
      <span id="bg-zoom-value">100%</span>
    </div>
    <div class="modal-actions">
      <button class="btn-primary" id="btn-close-bg">閉じる</button>
    </div>
  </div>
</div>

<script src="storage.js"></script>
<script src="sources.js"></script>
<script src="app.js"></script>
</body>
</html>
